  <rect x="10" y="10" width="44" height="44" rx="4" fill="#f0ede8"/>
  <rect x="10" y="10" width="44" height="8" rx="4" fill="#c8102e"/>
  <rect x="10" y="14" width="44" height="4" fill="#c8102e"/>
  <!-- Text lines -->
