  <rect x="15" y="30" width="28" height="2" rx="1" fill="#1a2744" opacity="0.4"/>
  <rect x="15" y="34" width="30" height="2" rx="1" fill="#1a2744" opacity="0.4"/>
  <rect x="15" y="38" width="24" height="2" rx="1" fill="#1a2744" opacity="0.4"/>
